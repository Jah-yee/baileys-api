<!DOCTYPE html>
<html>

<head>
    <title>SSE Demo</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@vue/reactivity@3.4.15/dist/reactivity.global.js"></script>
    <script src="https://unpkg.com/qrcode@1.4.4/build/qrcode.min.js"></script>
</head>

<body>
    <div class="bg-gray-100 p-4 overflow-x-hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-4">
                <form id="connectionForm" class="bg-white p-6 space-y-4 rounded shadow-md">
                    <h2 class="text-xl font-bold">Create Connection</h2>
                    <div>
                        <label class="block text-gray-700 mb-2">Name</label>
                        <input type="text" name="name" required class="w-full p-2 border rounded" />
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Phone Number</label>
                        <input type="text" name="phone" required class="w-full p-2 border rounded" />
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Authentication Method</label>
                        <select name="authMethod" class="w-full p-2 border rounded">
                            <option value="qr">QR Code</option>
                            <option value="pair">Pair Code</option>
                        </select>
                    </div>
                    <button type="submit" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600">
                        Submit
                    </button>
                </form>
                <div class="bg-white p-6 rounded shadow-md">
                    <h2 id="tokenTitle" class="text-xl font-bold mb-4">QR Code</h2>
                    <div id="tokenContainer" class="flex flex-col items-center">
                        <p class="text-gray-500">No token available</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded shadow-md self-start">
                <h2 class="text-xl font-bold mb-4">Events</h2>
                <ul id="eventsList" class="space-y-2">
                    <li class="text-gray-500">No events yet</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const { ref, reactive, effect } = VueReactivity;

        const state = reactive({
            events: [],
            token: { type: 'qr', data: null }
        });

        const BASE_URL = 'http://localhost:3000';

        const form = document.getElementById('connectionForm');
        const eventsList = document.getElementById('eventsList');
        const tokenTitle = document.getElementById('tokenTitle');
        const tokenContainer = document.getElementById('tokenContainer');

        async function handleSubmit(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(`${BASE_URL}/connections/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const json = await response.json();
                state.events.unshift(json);
            } catch (error) {
                console.error('Error creating connection:', error);
            }
        }

        function startStream() {
            const eventSource = new EventSource(`${BASE_URL}/connections/events`);

            eventSource.onmessage = async (event) => {
                console.log('Received event:', event);
                try {
                    const json = JSON.parse(event.data);
                    state.events.unshift(json);
                    if (json.event.name === 'connection:token_received') {
                        let token = json.event.data.token;
                        if (json.event.data.type === 'qr') {
                            token = await QRCode.toDataURL(token);
                        }
                        state.token = {
                            type: json.event.data.type,
                            data: token
                        };
                    } else {
                        state.token = { type: 'qr', data: null };
                    }
                } catch (error) {
                    console.error('Error parsing event data:', error);
                }
            };

            eventSource.onerror = (error) => {
                console.error('EventSource failed:', error);
                eventSource.close();
            };

            return eventSource;
        }

        effect(() => {
            if (state.events.length === 0) {
                eventsList.innerHTML = '<li class="text-gray-500">No events yet</li>';
            } else {
                eventsList.innerHTML = state.events
                    .map(event => `
                        <li class="p-2 bg-gray-100 rounded">
                            <pre class="whitespace-pre-wrap overflow-x-auto">${JSON.stringify(event, null, 2)}</pre>
                        </li>
                    `)
                    .join('');
            }
        });

        effect(() => {
            tokenTitle.textContent = state.token.type === 'qr' ? 'QR Code' : 'Pair Code';
        });

        effect(() => {
            if (state.token.data) {
                if (state.token.type === 'qr') {
                    tokenContainer.innerHTML = `<img src="${state.token.data}" alt="QR Code" class="w-64 h-auto" />`;
                } else {
                    tokenContainer.innerHTML = `<pre class="whitespace-pre-wrap">${state.token.data}</pre>`;
                }
            } else {
                tokenContainer.innerHTML = '<p class="text-gray-500">No token available</p>';
            }
        });

        form.addEventListener('submit', handleSubmit);

        const eventSource = startStream();
        window.addEventListener('beforeunload', () => {
            eventSource.close();
        });
    </script>
</body>

</html>
